<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D ASCII Logo Components</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: clamp(1rem, 5vw, 4rem);
        background: #edf3f7;
        color: #183247;
        font-family: system-ui, sans-serif;
      }
      main { width: min(1100px, 100%); margin: auto; }
      h1 { margin: 0 0 2rem; }
      h2 { margin: 2rem 0 0.75rem; }
      .tools { margin: -1rem 0 2rem; }
      .tools a { color: #087fa3; font-weight: 700; }
      haifa-logo-ascii { box-shadow: 0 1rem 3rem rgb(24 50 71 / 16%); }
      .white { --haifa-ascii-background: #fff; }
    </style>
    <script type="module" src="./haifa-logo-ascii.js?v=25"></script>
  </head>
  <body>
    <main>
      <h1>3D ASCII logo components</h1>
      <p class="tools"><a href="./point-cloud-editor.html">Open point-cloud editor</a></p>

      <h2>University of Haifa</h2>
      <haifa-logo-ascii
        label="Animated 3D ASCII art of the University of Haifa logo"
        motion="always"
      ></haifa-logo-ascii>

      <h2>Geometric logo</h2>
      <haifa-logo-ascii
        class="white"
        src="./second-logo-points.json?v=25"
        label="Animated 3D ASCII art of the blue geometric logo"
        motion="always"
      ></haifa-logo-ascii>
    </main>
  </body>
</html>
